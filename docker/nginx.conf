# nginx server config for the CephalonEngine docs static site.
# Copied into /etc/nginx/conf.d/default.conf by the runtime image stage.
#
# Serves the Astro `dist/` output: HTML pages in directory format
# (`<path>/index.html`), hashed assets under `/_astro/`, and verbatim
# `/public` assets (`/scripts/`, `/fonts/`).

server {
    listen       80;
    listen       [::]:80;
    server_name  _;

    root   /usr/share/nginx/html;
    index  index.html;

    # Collapse accidental double slashes (`//`) in request paths.
    merge_slashes on;

    # ---- Compression --------------------------------------------------------
    # GitHub Pages serves brotli; a self-hosted nginx does gzip out of the box.
    gzip            on;
    gzip_vary       on;
    gzip_min_length 256;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        application/javascript
        application/json
        application/xml
        application/manifest+json
        image/svg+xml;

    # ---- Security headers ---------------------------------------------------
    add_header X-Content-Type-Options "nosniff"                        always;
    add_header X-Frame-Options        "SAMEORIGIN"                     always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;

    # ---- Hashed build assets — immutable, cache for a year ------------------
    # Astro fingerprints everything under /_astro/ with a content hash; a
    # changed file always gets a brand-new URL, so this is safe to cache hard.
    location /_astro/ {
        expires    1y;
        add_header Cache-Control "public, immutable";
        try_files  $uri =404;
    }

    # ---- /public assets — stable URL, moderate cache ------------------------
    # site-ui.js and fonts keep the same URL across builds, so cap the cache
    # at one hour to pick up changes within a deploy cycle.
    location ~* ^/(scripts|fonts)/ {
        expires    1h;
        add_header Cache-Control "public";
        try_files  $uri =404;
    }

    # ---- Pages --------------------------------------------------------------
    # Astro's default `build.format: 'directory'` emits every page as
    # `<path>/index.html`. `try_files` resolves:
    #   /guide/quickstart       → /guide/quickstart/index.html  ($uri/index.html)
    #   /guide/quickstart/      → directory → index directive   ($uri/)
    # Astro static redirects are plain meta-refresh HTML files — served as-is.
    location / {
        try_files $uri $uri/index.html $uri/ =404;
    }

    # ---- Custom 404 ---------------------------------------------------------
    error_page 404 /404.html;
}
